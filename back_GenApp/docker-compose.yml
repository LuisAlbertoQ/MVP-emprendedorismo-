version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: geneapp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-geneapp123}
      MYSQL_DATABASE: ${DB_NAME:-geneapp}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geneapp_net

  backend:
    build: .
    container_name: geneapp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-prod-change-me-please}
      DEBUG: ${DEBUG:-False}
      DB_NAME: ${DB_NAME:-geneapp}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-geneapp123}
      DB_HOST: db
      DB_PORT: 3306
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,your-ec2-public-ip}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    networks:
      - geneapp_net

volumes:
  mysql_data:
  media_data:

networks:
  geneapp_net:
    driver: bridge
